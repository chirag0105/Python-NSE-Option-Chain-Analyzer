<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSE Option Chain Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header>
            <h1>NSE Option Analyzer</h1>
            <button id="configure-btn" class="btn">Configure Symbols</button>
        </header>

        <main id="dashboard-container" class="dashboard-grid">
            <!-- Cards will be dynamically injected here via JS -->
        </main>

        <div id="setup-modal" class="modal hidden">
            <div class="modal-content glass-panel">
                <h2>Select Symbols to Track</h2>
                <div class="modal-body">
                    <div class="symbol-section">
                        <h3>Indices</h3>
                        <div id="indices-list" class="checkbox-grid"></div>
                    </div>
                    <div class="symbol-section">
                        <h3>Equities</h3>
                        <div id="equities-list" class="checkbox-grid"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="save-config-btn" class="btn primary-btn">Save Configuration</button>
                </div>
            </div>
        </div>
        <div id="detail-modal" class="modal hidden">
            <div class="modal-content glass-panel detail-panel">
                <div class="detail-header">
                    <h2 id="detail-symbol-name">Symbol</h2>
                    <button id="close-detail-btn" class="btn">✕</button>
                </div>
                <div class="detail-meta card-meta">
                    <span id="detail-expiry">Expiry: ...</span>
                    <span id="detail-timestamp" class="timestamp">...</span>
                    <span class="underlying-value" id="detail-underlying">₹...</span>
                </div>
                <div class="modal-body">
                    <table id="detail-table" class="options-table detail-table">
                        <thead>
                            <tr>
                                <th>Call OI</th>
                                <th>Call LTP</th>
                                <th class="strike-col">Strike</th>
                                <th>Put LTP</th>
                                <th>Put OI</th>
                            </tr>
                        </thead>
                        <tbody id="detail-table-body">
                            <!-- Rows injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty js file for now -->
    <script src="app.js"></script>
</body>

</html>
